<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Logbook M2">
<title>Logbook M2 — Alessio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#f2f2f7;color:#000;min-height:100vh}
  .screen{display:none}
  .screen.active{display:block}

  /* HOME */
  .home-header{background:#fff;padding:52px 20px 16px;border-bottom:0.5px solid #e0e0e0}
  .home-title{font-size:28px;font-weight:700;color:#000}
  .home-sub{font-size:14px;color:#888;margin-top:2px}
  .section-label{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.4px;padding:20px 20px 8px}
  .session-card{background:#fff;margin:0 16px 10px;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,0.05)}
  .session-card:active{opacity:0.7}
  .s-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .s-info{flex:1;margin-left:12px}
  .s-name{font-size:16px;font-weight:600;color:#000}
  .s-meta{font-size:13px;color:#888;margin-top:2px}
  .s-date{font-size:11px;color:#aaa;margin-top:3px}
  .s-chev{color:#c7c7cc;font-size:18px}

  /* SESSION */
  .session-header{background:#fff;padding:52px 20px 14px;border-bottom:0.5px solid #e0e0e0;position:sticky;top:0;z-index:10}
  .back-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .back-btn{background:none;border:none;font-size:16px;color:#007aff;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;font-family:inherit}
  .sess-title{font-size:24px;font-weight:700}
  .sess-date{font-size:13px;color:#888;margin-top:2px}

  /* EXERCISE BLOCK */
  .ex-block{background:#fff;margin:10px 16px 0;border-radius:14px;overflow:hidden}
  .ex-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .ex-header:active{background:#f9f9f9}
  .ex-name{font-size:15px;font-weight:600;color:#000}
  .ex-info{font-size:12px;color:#888;margin-top:3px}
  .ex-chev{color:#c7c7cc;font-size:16px;transition:transform 0.2s}
  .ex-chev.open{transform:rotate(180deg)}
  .ex-body{border-top:0.5px solid #f0f0f0;padding:12px 16px}
  .hint{font-size:11px;color:#888;background:#f9f9f9;border-radius:8px;padding:6px 10px;margin-bottom:10px;line-height:1.5}

  /* SERIE */
  .col-headers{display:grid;grid-template-columns:24px 1fr 1fr 1fr;gap:6px;margin-bottom:4px}
  .col-h{font-size:10px;font-weight:600;color:#aaa;text-align:center;text-transform:uppercase}
  .serie-row{display:grid;grid-template-columns:24px 1fr 1fr 1fr;gap:6px;align-items:center;padding:5px 0}
  .serie-n{font-size:13px;font-weight:600;color:#aaa;text-align:center}
  .serie-input{width:100%;border:1px solid #e5e5ea;border-radius:8px;padding:7px 4px;font-size:15px;text-align:center;background:#fff;color:#000;font-family:inherit;-webkit-appearance:none}
  .serie-input:focus{outline:none;border-color:#007aff}
  .serie-input.note-input{font-size:12px}
  .prev-block{background:#f9f9f9;border-radius:8px;padding:6px 10px;margin-top:6px}
  .prev-title{font-size:10px;color:#aaa;font-weight:600;margin-bottom:4px;text-transform:uppercase}
  .prev-row{display:grid;grid-template-columns:24px 1fr 1fr 1fr;gap:6px;align-items:center;margin-bottom:2px}
  .prev-n{font-size:11px;color:#bbb;text-align:center}
  .prev-val{font-size:12px;color:#888;text-align:center}
  .gen-notes{width:100%;border:1px solid #e5e5ea;border-radius:8px;padding:8px 10px;font-size:14px;background:#fff;color:#000;resize:none;font-family:inherit;margin-top:10px}
  .gen-notes:focus{outline:none;border-color:#007aff}
  .prev-gen{font-size:11px;color:#aaa;margin-top:6px;font-style:italic}

  /* SAVE */
  .save-ex-btn{width:100%;background:#000;color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px}
  .save-ex-btn:active{opacity:0.8}
  .save-ex-btn.saved{background:#34c759}
  .bottom-pad{height:30px}

  /* TOAST */
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;border-radius:20px;padding:10px 22px;font-size:14px;font-weight:500;display:none;z-index:999;white-space:nowrap;backdrop-filter:blur(10px)}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-title">Logbook</div>
    <div class="home-sub">Mesociclo 2 — Alessio</div>
  </div>
  <div class="section-label">Sessioni</div>
  <div id="session-list"></div>
</div>

<!-- SESSION -->
<div id="screen-session" class="screen">
  <div class="session-header">
    <div class="back-row">
      <button class="back-btn" onclick="goHome()">&#8592; Sessioni</button>
    </div>
    <div class="sess-title" id="sess-title"></div>
    <div class="sess-date" id="sess-date"></div>
  </div>
  <div id="ex-container"></div>
  <div class="bottom-pad"></div>
</div>

<div class="toast" id="toast">✓ Salvato</div>

<script>
const SESSIONS = [
  {
    id:"push", name:"Push", emoji:"⬆️", bg:"#E8F4FD", color:"#1a7abf",
    exercises:[
      {id:"alzate_cavo",      name:"Alzate laterali cavo avanti",          series:2, rep:"6–9",  hint:"Cavo altezza mano · 90'' fra arto"},
      {id:"multipower",       name:"Multipower 30°",                        series:2, rep:"5–8",  hint:"1'' di fermo in basso"},
      {id:"alzate_manu",      name:"Alzate laterali manubri supportate",    series:1, rep:"6–9",  hint:"Panca 75° · 1'' fermo in entrambi i punti di inversione"},
      {id:"croci_cavi",       name:"Croci su panca 60° con cavi bassi",     series:2, rep:"7–10", hint:"Panca leggermente indietro rispetto ai cavi · focus flessione di spalla"},
      {id:"overhead_ext",     name:"Overhead extension",                    series:2, rep:"7–10", hint:"Cavo altezza bacino"},
      {id:"crunch_push",      name:"Crunch al cavo alto",                   series:2, rep:"8–12", hint:"Con anca bloccata"}
    ]
  },
  {
    id:"pull_a", name:"Pull A", emoji:"⬇️", bg:"#EAFBF0", color:"#1a9e52",
    exercises:[
      {id:"lat_neut_a",   name:"Lat machine neutra",           series:2, rep:"6–9",  hint:"Schiena neutra · fermati quando l'omero è in linea con il busto · di spalle alla lat"},
      {id:"kelso",        name:"Kelso shrugs su panca 30°",    series:2, rep:"6–9",  hint:"1'' di fermo in alto"},
      {id:"seal_row_a",   name:"Seal row su panca 30°",        series:2, rep:"5–8",  hint:"Fermati quando l'omero raggiunge il busto"},
      {id:"faceaway_curl",name:"Faceaway cable curl",           series:2, rep:"6–9",  hint:"1'' di fermo in basso · furioso durante le serie"},
      {id:"rear_delt_ext",name:"Single rear delt extension",   series:2, rep:"7–10", hint:"Al cavo · addurre l'omero a circa 45° · 90'' fra braccio"}
    ]
  },
  {
    id:"lower_sh", name:"Lower + Shoulders", emoji:"🦵", bg:"#FEF6EA", color:"#b87010",
    exercises:[
      {id:"alzate_cavo_l", name:"Alzate laterali cavo avanti", series:2, rep:"6–9",  hint:"Cavo altezza mano · 90'' fra braccio"},
      {id:"leg_curl_sd",   name:"Leg curl sdraiato",           series:2, rep:"6–9",  hint:"Punte in dorsiflessione!"},
      {id:"hack_squat",    name:"Hack squat",                  series:2, rep:"5–8",  hint:"1'' di fermo in basso · punte leggermente extraruotate"},
      {id:"hyperext",      name:"Hyperextension",              series:2, rep:"7–10", hint:""},
      {id:"leg_ext",       name:"Leg extension",               series:1, rep:"5–8",  hint:""},
      {id:"crunch_l",      name:"Crunch al cavo alto",         series:2, rep:"8–12", hint:"Con anca bloccata"}
    ]
  },
  {
    id:"upper", name:"Upper", emoji:"💪", bg:"#FCEEF5", color:"#b03070",
    exercises:[
      {id:"lat_neut_u",name:"Lat machine neutra",          series:2, rep:"6–9",  hint:""},
      {id:"multi_u",   name:"Multipower 30°",              series:2, rep:"6–9",  hint:""},
      {id:"seal_row_u",name:"Seal row su panca 30°",       series:2, rep:"6–9",  hint:"Fermati quando l'omero raggiunge il busto"},
      {id:"chest",     name:"Chest press",                 series:2, rep:"5–8",  hint:""},
      {id:"pushdown",  name:"Pushdown in ginocchio",       series:2, rep:"7–10", hint:"Inclinati in modo che l'omero sia in linea con il cavo"},
      {id:"exorcism",  name:"Exorcism curl",               series:2, rep:"6–9",  hint:""}
    ]
  }
];

let currentSession = null;

function getData(){
  try{ return JSON.parse(localStorage.getItem('logbook_m2') || '{}') }
  catch(e){ return {} }
}
function saveData(d){ localStorage.setItem('logbook_m2', JSON.stringify(d)) }

function getLastEntry(sid){
  const d = getData();
  const entries = d[sid] || [];
  return entries.length ? entries[entries.length-1] : null;
}

function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'});
}

function renderHome(){
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  SESSIONS.forEach(s => {
    const last = getLastEntry(s.id);
    const card = document.createElement('div');
    card.className = 'session-card';
    card.onclick = () => openSession(s.id);
    card.innerHTML = `
      <div class="s-icon" style="background:${s.bg};font-size:20px">${s.emoji}</div>
      <div class="s-info">
        <div class="s-name">${s.name}</div>
        <div class="s-meta">${s.exercises.length} esercizi</div>
        ${last ? `<div class="s-date">Ultima: ${fmtDate(last.date)}</div>` : '<div class="s-date">Nessuna sessione salvata</div>'}
      </div>
      <div class="s-chev">›</div>
    `;
    list.appendChild(card);
  });
}

function openSession(sid){
  currentSession = SESSIONS.find(s => s.id === sid);
  const last = getLastEntry(sid);

  document.getElementById('sess-title').textContent = currentSession.name;
  document.getElementById('sess-date').textContent = new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const container = document.getElementById('ex-container');
  container.innerHTML = '';

  currentSession.exercises.forEach((ex, ei) => {
    const lastEx = last && last.exercises && last.exercises[ei];

    const colHeaders = `
      <div class="col-headers">
        <div></div>
        <div class="col-h">kg</div>
        <div class="col-h">reps</div>
        <div class="col-h">note</div>
      </div>`;

    const seriesHTML = Array.from({length: ex.series}, (_, si) => `
      <div class="serie-row">
        <div class="serie-n">${si+1}</div>
        <input class="serie-input" type="number" step="0.5" min="0" placeholder="—" id="kg_${ei}_${si}" inputmode="decimal">
        <input class="serie-input" type="number" min="0" placeholder="—" id="reps_${ei}_${si}" inputmode="numeric">
        <input class="serie-input note-input" type="text" placeholder="—" id="note_${ei}_${si}">
      </div>
    `).join('');

    let prevHTML = '';
    if(lastEx && lastEx.series && lastEx.series.length){
      const rows = lastEx.series.map((ps, si) => `
        <div class="prev-row">
          <div class="prev-n">${si+1}</div>
          <div class="prev-val">${ps.kg||'—'} kg</div>
          <div class="prev-val">${ps.reps||'—'} rep</div>
          <div class="prev-val" style="font-size:11px">${ps.note||'—'}</div>
        </div>
      `).join('');
      prevHTML = `
        <div class="prev-block">
          <div class="prev-title">Ultima volta (${fmtDate(last.date)})</div>
          ${rows}
        </div>`;
    }

    const prevNotes = lastEx && lastEx.notes ? `<div class="prev-gen">📝 Ultima volta: ${lastEx.notes}</div>` : '';

    const block = document.createElement('div');
    block.className = 'ex-block';
    block.innerHTML = `
      <div class="ex-header" onclick="toggleEx(this)">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-info">${ex.series} serie × ${ex.rep} rep</div>
        </div>
        <span class="ex-chev open">▾</span>
      </div>
      <div class="ex-body">
        ${ex.hint ? `<div class="hint">ℹ️ ${ex.hint}</div>` : ''}
        ${colHeaders}
        ${seriesHTML}
        ${prevHTML}
        <textarea class="gen-notes" rows="2" placeholder="Note generali sull'esercizio..." id="gen_${ei}"></textarea>
        ${prevNotes}
        <button class="save-ex-btn" id="savebtn_${ei}" onclick="saveExercise(${ei})">Salva esercizio</button>
      </div>
    `;
    container.appendChild(block);
  });

  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-session').classList.add('active');
  window.scrollTo(0,0);
}

function toggleEx(header){
  const body = header.nextElementSibling;
  const chev = header.querySelector('.ex-chev');
  if(body.style.display === 'none'){
    body.style.display = '';
    chev.classList.add('open');
  } else {
    body.style.display = 'none';
    chev.classList.remove('open');
  }
}

function goHome(){
  document.getElementById('screen-session').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');
  renderHome();
  window.scrollTo(0,0);
}

function getOrCreateTodayEntry(sid){
  const d = getData();
  if(!d[sid]) d[sid] = [];
  const today = new Date().toDateString();
  let entry = d[sid].find(e => new Date(e.date).toDateString() === today);
  if(!entry){
    entry = { date: new Date().toISOString(), exercises: [] };
    d[sid].push(entry);
  }
  return { d, entry };
}

function saveExercise(ei){
  if(!currentSession) return;
  const ex = currentSession.exercises[ei];
  const exData = {
    name: ex.name,
    series: Array.from({length: ex.series}, (_, si) => ({
      kg:   document.getElementById(`kg_${ei}_${si}`)?.value || '',
      reps: document.getElementById(`reps_${ei}_${si}`)?.value || '',
      note: document.getElementById(`note_${ei}_${si}`)?.value || ''
    })),
    notes: document.getElementById(`gen_${ei}`)?.value || ''
  };

  const { d, entry } = getOrCreateTodayEntry(currentSession.id);
  entry.exercises[ei] = exData;
  saveData(d);

  const btn = document.getElementById(`savebtn_${ei}`);
  btn.textContent = '✓ Salvato';
  btn.classList.add('saved');
  setTimeout(() => {
    btn.textContent = 'Salva esercizio';
    btn.classList.remove('saved');
  }, 2000);

  const toast = document.getElementById('toast');
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 1800);
}

renderHome();
</script>
</body>
</html>
